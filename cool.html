<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>炫酷网页</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #f0f0f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 4em;
  text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from {
    text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
  }
  to {
    text-shadow: 0 0 20px #00eaff, 0 0 30px #00eaff;
  }
}

p {
  font-size: 1.2em;
  max-width: 500px;
  margin-top: 20px;
}
</style>
</head>
<body>
  <div>
    <h1>赛博朋克世界</h1>
    <p>欢迎来到充满霓虹与金属的未来都市。在这里，一切皆有可能。</p>
  </div>
</body>
</html>
